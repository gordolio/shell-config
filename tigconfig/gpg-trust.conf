# GPG trust manifest — used by gpg-trust-check.sh / `ls-tools --trust`.
#
# One key per line. Format:
#   <fingerprint>  <trust>  <description>
#
# trust:
#   ultimate  — keys you own (have the secret key for). Sets ownertrust to 5.
#   full      — external keys you trust to verify signatures. Sets ownertrust
#               to 4 AND requires a local signature (gpg --lsign-key) so the
#               key shows as [full] validity rather than [unknown].
#
# Lines starting with # or empty are ignored. Whitespace separated.
# Edit when keys rotate; check in to share across machines.

